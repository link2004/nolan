name: CueCam
options:
  bundleIdPrefix: com.nolan
  deploymentTarget:
    iOS: "18.0"
packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.17.0
settings:
  base:
    DEVELOPMENT_TEAM: 7LF5Z5CUCR
    SWIFT_VERSION: "6.0"
targets:
  CueCam:
    type: application
    platform: iOS
    sources:
      - CueCam
    dependencies:
      - package: ComposableArchitecture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nolan.ios
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: CueCam/Info.plist
      properties:
        CFBundleDisplayName: CueCam
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Local network access is used to load vault data from the local servers on your Mac.
        NSCameraUsageDescription: CueCam uses the camera to record video for each scripted shot on the storyboard.
        NSMicrophoneUsageDescription: CueCam uses the microphone to record audio while filming.
        NSPhotoLibraryAddUsageDescription: CueCam saves your approved takes to the camera roll.
        UIAppFonts:
          - InstrumentSerif-Regular.ttf
          - InstrumentSerif-Italic.ttf
        UILaunchScreen: {}
        # 横向きは撮影画面専用。他画面は OrientationLockDelegate が縦に固定する (ADR-004)
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationLandscapeLeft
  # ShootFeature(スクリプト付き撮影フロー)を単体で実機起動するための開発用シェル。
  # CueCam本体への統合方針決定後に削除予定 (ADR-003)
  ShootCam:
    type: application
    platform: iOS
    sources:
      - path: ShootCam
      - path: CueCam/Features/ShootFeature
      - path: CueCam/Clients/CameraClient.swift
      - path: CueCam/Clients/PhotoLibraryClient.swift
      - path: CueCam/Models/ShotScript.swift
      # Design はディレクトリごと参照しない(並行開発中の他機能のファイルを巻き込まないため)
      - path: CueCam/Design/AppColor.swift
      - path: CueCam/Design/Theme.swift
      - path: CueCam/Design/Fonts
    dependencies:
      - package: ComposableArchitecture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nolan.shootcam
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: ShootCam/Info.plist
      properties:
        CFBundleDisplayName: ShootCam
        NSCameraUsageDescription: ShootCam uses the camera to record video for each scripted shot
        NSMicrophoneUsageDescription: ShootCam uses the microphone to record audio while filming
        NSPhotoLibraryAddUsageDescription: ShootCam saves your approved takes to the camera roll.
        UIAppFonts:
          - InstrumentSerif-Regular.ttf
          - InstrumentSerif-Italic.ttf
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationLandscapeLeft

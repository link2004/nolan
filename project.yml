name: CueCam
options:
  bundleIdPrefix: com.cuecam
  deploymentTarget:
    iOS: "18.0"
packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.17.0
settings:
  base:
    DEVELOPMENT_TEAM: 7LF5Z5CUCR
    SWIFT_VERSION: "6.0"
targets:
  CueCam:
    type: application
    platform: iOS
    sources:
      - CueCam
    dependencies:
      - package: ComposableArchitecture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cuecam.app
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: CueCam/Info.plist
      properties:
        CFBundleDisplayName: CueCam
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: MacのローカルサーバーからVaultのメディアを読み込むためにローカルネットワークを使用します
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
